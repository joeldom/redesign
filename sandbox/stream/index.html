<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Stream Start Screen</title>

    <link rel="shortcut icon" href="https://joeldom.github.io/asset/favicon.ico" rel="icon" type="image/x-icon">
    <link rel="icon shortcut" href="https://joeldom.github.io/asset/favicon/64x64.png" sizes="64x64" />
    <link rel="icon shortcut" href="https://joeldom.github.io/asset/favicon/128x128.png" sizes="128x128" />
    <link rel="icon shortcut" href="https://joeldom.github.io/asset/favicon/192x192.png" sizes="192x192" />
    <link rel="apple-touch-icon" href="https://joeldom.github.io/asset/favicon/76x76.png" sizes="76x76" />
    <link rel="apple-touch-icon" href="https://joeldom.github.io/asset/favicon/120x120.png" sizes="120x120" />
    <link rel="apple-touch-icon" href="https://joeldom.github.io/asset/favicon/152x152.png" sizes="152x152" />
    <link rel="apple-touch-icon" href="https://joeldom.github.io/asset/favicon/180x180.png" sizes="180x180" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Helvetica', 'Arial', sans-serif;
            background: #0a0a0a;
            color: #ffffff;
            overflow: hidden;
            height: 100vh;
        }
        
        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.6s ease-in-out;
        }
        
        .screen.active {
            opacity: 1;
            pointer-events: all;
        }
        /* Setup Screen */
        
        .setup-screen {
            /* background: linear-gradient(135deg, #1a1a1a 0%, #0a0a0a 100%); */
            background-color: #1a1e1c;
        }
        
        .setup-container {
            background: rgba(20, 20, 20, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1px;
            padding: 24px 48px 48px;
            width: 90%;
            max-width: 500px;
            /* box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5); */
        }
        
        .setup-container .logo-header {
            display: block;
            margin: 0 auto 8px;
        }
        
        .setup-container h2 {
            font-size: 18px;
            font-weight: 100;
            margin-bottom: 18px;
            text-align: center;
            color: #ffffff;
            letter-spacing: 0.5px;
        }
        
        .form-group {
            margin-bottom: 24px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 13px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.7);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 14px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 8px;
            color: #ffffff;
            font-size: 15px;
            transition: all 0.3s ease;
        }
        
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: rgba(255, 255, 255, 0.4);
            background: rgba(255, 255, 255, 0.08);
        }
        
        .form-group select option {
            background: #1a1a1a;
            color: #ffffff;
            padding: 12px;
        }
        
        .form-group textarea {
            resize: vertical;
            min-height: 80px;
            font-family: inherit;
        }
        
        .start-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #2a2a2a 0%, #1a1a1a 100%);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: #ffffff;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            transition: all 0.3s ease;
            margin-top: 16px;
        }
        
        .start-btn:hover {
            background: linear-gradient(135deg, #3a3a3a 0%, #2a2a2a 100%);
            border-color: rgba(255, 255, 255, 0.4);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
        }
        /* Timer Screen */
        
        .timer-screen {
            /* background: linear-gradient(135deg, #0f0f0f 0%, #000000 100%); */
            background-color: #000;
            flex-direction: column;
        }
        
        .logo {
            width: 120px;
            height: auto;
            margin-bottom: 32px;
            opacity: 0.9;
        }
        
        .stream-title {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 48px;
            text-align: center;
            max-width: 80%;
            line-height: 1.4;
        }
        
        .timer-display {
            font-size: 120px;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
            letter-spacing: 4px;
            margin-bottom: 24px;
            text-shadow: 0 0 40px rgba(255, 255, 255, 0.3);
        }
        
        .milliseconds {
            font-size: 60px;
            opacity: 0.7;
            margin-left: 8px;
        }
        
        .timer-label {
            font-size: 18px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.6);
            text-transform: uppercase;
            letter-spacing: 3px;
        }
        /* Launch Screen */
        
        .launch-screen {
            background: #000000;
        }
        
        .launch-screen .background-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            image-rendering: -webkit-optimize-contrast;
            image-rendering: crisp-edges;
            image-rendering: pixelated;
        }
        
        .background-container.cover {
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }
        
        .background-container.tiled {
            background-size: auto;
            background-position: top left;
            background-repeat: repeat;
        }
        
        .background-container.centered {
            background-size: auto;
            background-position: center;
            background-repeat: no-repeat;
        }
        
        .launch-content {
            position: relative;
            z-index: 2;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.4);
            width: 100%;
            height: 100%;
            backdrop-filter: blur(4px);
        }
        
        .launch-message {
            font-size: 48px;
            font-weight: 700;
            margin-top: 24px;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.8);
            max-width: 80%;
            line-height: 1.3;
        }
        /* Back Button */
        
        .back-btn {
            position: absolute;
            bottom: 32px;
            right: 32px;
            width: 56px;
            height: 56px;
            background: rgba(20, 20, 20, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.3s ease, transform 0.3s ease, background 0.3s ease;
            z-index: 10;
        }
        
        .back-btn:hover {
            opacity: 1 !important;
            background: rgba(30, 30, 30, 0.95);
            transform: scale(1.1);
        }
        
        .timer-screen:hover .back-btn,
        .launch-screen:hover .back-btn {
            opacity: 1;
        }
        
        .back-btn svg {
            width: 24px;
            height: 24px;
            fill: #ffffff;
        }
        
        @media (max-width: 768px) {
            .setup-container {
                padding: 32px 24px;
                width: 95%;
            }
            .timer-display {
                font-size: 72px;
                letter-spacing: 2px;
            }
            .milliseconds {
                font-size: 36px;
            }
            .stream-title {
                font-size: 24px;
            }
            .launch-message {
                font-size: 32px;
            }
            .logo {
                width: 80px;
            }
        }
        
        .omega {
            font-family: Arial, sans-serif;
            font-size: 14px;
            color: #949494;
            line-height: 1.78571;
            display: block;
            position: absolute;
            bottom: 0;
            margin: 0 auto;
            width: 100%;
            opacity: 0.5;
            text-align: center;
            background: #021317b2;
            background: #203135b2;
            border-top: 1px solid #000000;
            transition: background 1.3s ease;
            z-index: 9999;
        }
        
        .omega:hover {
            background: #000000;
            transition: background 0.93s ease;
        }
        
        .omega a {
            text-decoration: none;
            color: #ccc;
        }
    </style>
</head>

<body>
    <!-- Setup Screen -->
    <div class="screen setup-screen active">
        <div class="setup-container">
            <img class="logo-header" src="https://joeldom.github.io/asset/chip-logo.png" width="52px" height="52px">
            <h2>Stream Setup</h2>
            <form id="setupForm">
                <div class="form-group">
                    <label for="title">Stream Title</label>
                    <input type="text" id="title" placeholder="Enter stream title">
                </div>

                <div class="form-group">
                    <label for="timeSelect">Time Until Start</label>
                    <select id="timeSelect" required>
                        <option value="0.167" selected>10 seconds</option>
                        <option value="1">1 minute</option>
                        <option value="2">2 minutes</option>
                        <option value="5">5 minutes</option>
                        <option value="10">10 minutes</option>
                        <option value="15">15 minutes</option>
                        <option value="20">20 minutes</option>
                        <option value="25">25 minutes</option>
                        <option value="30">30 minutes</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="backgroundUrl">Background Image/GIF URL</label>
                    <input type="url" id="backgroundUrl" placeholder="https://example.com/image.gif (optional)">
                    <span class="background-url-hint" style="font-size: .85em;display: block;margin:10px 0 0 10px;">
						<pre title="WideVibe">https://cdn.7tv.app/emote/01G1GXCR380004YN3NKDRR9QHD/4x.avif</pre>
						<pre title="Quin">https://cdn.7tv.app/emote/01J7XAZN780001NDPTMGEE20VK/4x.avif</pre>
					</span>
                </div>

                <div class="form-group">
                    <label for="bgStyle">Background Style</label>
                    <select id="bgStyle">
                        <option value="cover" selected>Cover (fill screen)</option>
                        <option value="tiled">Tiled (repeat)</option>
                        <option value="centered">Centered</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="launchMsg">Launch Message</label>
                    <textarea id="launchMsg" placeholder="Message to display when stream starts"></textarea>
                </div>

                <button type="submit" class="start-btn">Start Timer</button>
            </form>
        </div>
        <p class="omega"><a href="https://joeldom.github.io/redesign/">Joel Dombek</a> © X.X.MMXXV <a href="https://joeldom.github.io/redesign/sandbox/">v1</a></p>
    </div>

    <!-- Timer Screen -->
    <div class="screen timer-screen">
        <button class="back-btn" onclick="resetToSetup()">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67z"/>
            </svg>
        </button>
        <img src="https://joeldom.github.io/asset/chip-logo.png" alt="Logo" class="logo">
        <div class="stream-title" id="displayTitle"></div>
        <div class="timer-display">
            <span id="timerDisplay">00:00</span><span class="milliseconds" id="millisDisplay">.000</span>
        </div>
        <div class="timer-label">Starting Soon</div>
    </div>

    <!-- Launch Screen -->
    <div class="screen launch-screen">
        <div class="background-container cover" id="backgroundContainer"></div>
        <div class="launch-content">
            <button class="back-btn" onclick="resetToSetup()">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67z"/>
                </svg>
            </button>
            <img src="https://joeldom.github.io/asset/chip-logo.png" alt="Logo" class="logo">
            <div class="launch-message" id="displayLaunchMsg"></div>
        </div>
    </div>

    <script>
        let countdownInterval;
        let streamData = {};
        let currentScreen = 'setup';

        const screens = {
            setup: document.querySelector('.setup-screen'),
            timer: document.querySelector('.timer-screen'),
            launch: document.querySelector('.launch-screen')
        };

        // Spacebar listener to skip to launch
        document.addEventListener('keydown', function(e) {
            if (e.code === 'Space' && currentScreen === 'timer') {
                e.preventDefault();
                if (countdownInterval) {
                    clearInterval(countdownInterval);
                }
                launchStream();
            }
        });

        function switchScreen(from, to) {
            screens[from].classList.remove('active');
            currentScreen = to;
            setTimeout(() => {
                screens[to].classList.add('active');
            }, 200);
        }

        document.getElementById('setupForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const customBgUrl = document.getElementById('backgroundUrl').value.trim();
            const defaultBgUrl = 'https://joeldom.github.io/asset/images/r/beyond-matrix.gif';
            const bgStyle = document.getElementById('bgStyle').value;

            streamData = {
                title: document.getElementById('title').value,
                minutes: parseFloat(document.getElementById('timeSelect').value),
                launchMsg: document.getElementById('launchMsg').value,
                backgroundUrl: customBgUrl || defaultBgUrl,
                backgroundStyle: bgStyle
            };

            document.getElementById('displayTitle').textContent = streamData.title;

            const bgElement = document.getElementById('backgroundContainer');
            bgElement.style.backgroundImage = `url('${streamData.backgroundUrl}')`;
            bgElement.className = 'background-container ' + streamData.backgroundStyle;

            switchScreen('setup', 'timer');
            startCountdown(streamData.minutes);
        });

        function startCountdown(minutes) {
            let totalMilliseconds = minutes * 60 * 1000;
            const startTime = Date.now();
            const endTime = startTime + totalMilliseconds;

            function updateDisplay() {
                const now = Date.now();
                const remaining = endTime - now;

                if (remaining <= 0) {
                    document.getElementById('timerDisplay').textContent = '00:00';
                    document.getElementById('millisDisplay').textContent = '.000';
                    document.getElementById('millisDisplay').textContent = '.000';
                    clearInterval(countdownInterval);
                    launchStream();
                    return;
                }

                const mins = Math.floor(remaining / 60000);
                const secs = Math.floor((remaining % 60000) / 1000);
                const ms = Math.floor((remaining % 1000));

                document.getElementById('timerDisplay').textContent =
                    `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
                document.getElementById('millisDisplay').textContent =
                    `.${String(ms).padStart(3, '0')}`;
            }

            updateDisplay();
            countdownInterval = setInterval(updateDisplay, 10); // Update every 10ms for smooth milliseconds
        }

        function launchStream() {
            document.getElementById('displayLaunchMsg').textContent = streamData.launchMsg;
            switchScreen('timer', 'launch');
        }

        function resetToSetup() {
            if (countdownInterval) {
                clearInterval(countdownInterval);
            }

            const currentScreen = document.querySelector('.screen.active');
            const screenName = currentScreen.classList.contains('timer-screen') ? 'timer' : 'launch';

            switchScreen(screenName, 'setup');

            document.getElementById('setupForm').reset();
            document.getElementById('timerDisplay').textContent = '00:00';
        }
    </script>
</body>

</html>
