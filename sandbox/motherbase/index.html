<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0" />
    <title>MOTHERBASE 💿 MGSV Recruit Generator</title>

    <!-- Bootstrap and your custom styles -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://joeldom.github.io/redesign/greybox/css/coma.css" rel="stylesheet">
    <link href="https://joeldom.github.io/style-guide/css/login.css" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.min.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #000;
            color: #E0E0E0;
            overflow-x: hidden;
            height: 100%;
        }
        
        .split-layout {
            display: flex;
            flex-direction: row;
            gap: 20px;
            max-width: 1200px;
            margin: 20px auto;
            padding: 20px;
        }
        
        #leftPanel {
            width: 50%;
            background-color: #1a1a1a;
            padding: 10px;
            border: 1px solid #333;
            border-radius: 8px;
        }
        
        #rightPanel {
            width: 50%;
        }
        
        button {
            display: inline-block;
            margin: 10px 5px;
            padding: 10px 20px;
            font-size: 16px;
            background-color: rgb(22, 24, 28);
            color: white;
            border: 1px solid rgb(42, 45, 48);
            border-radius: 5px;
            cursor: pointer;
        }
        
        button:hover {
            background-color: #4f0909;
            border-color: #8a1111;
        }
        
        .recruit {
            padding: 10px 12px;
            margin-bottom: 10px;
            position: relative;
            border: 1px solid #201e34;
            background: #3b266b1f;
            border-radius: 0px;
        }
        
        .recruit .recruit-info {
            margin: 5px 0;
            font-size: 16px;
            color: #E0E0E0;
        }
        
        .stat,
        .indices,
        .lineage {
            margin: 5px 0;
            font-size: 14px;
            color: #B0B0B0;
        }
        
        .grade0 {
            color: #FFFFFF;
        }
        
        .grade1 {
            color: #ADE0FF;
        }
        
        .grade2 {
            color: #6EA7FE;
        }
        
        .grade3 {
            color: #3C89FF;
        }
        
        .grade4 {
            color: #D2FF3C;
        }
        
        .grade5 {
            color: #FFF93C;
        }
        
        .grade6 {
            color: #FFC527;
        }
        
        .grade7 {
            color: #FF8A15;
        }
        
        .grade8 {
            color: #FF6200;
        }
        
        .grade9 {
            color: #AE00FF;
        }
        
        .rank [class*="grade"] {
            display: block;
            font-size: 2em;
            text-align: right;
        }
        
        .rank {
            position: absolute;
            right: 12px;
            top: 12px;
            text-align: right;
        }
        
        .firefly {
            position: absolute;
            background: radial-gradient(circle, #6cd2dc 10%, transparent 70%);
            border-radius: 50%;
            animation: floatAndFade 8s infinite ease-in-out;
        }
        
        @keyframes floatAndFade {
            0% {
                opacity: 0;
                transform: translate(0, 0) scale(0.5);
            }
            20% {
                opacity: 1;
            }
            80% {
                opacity: 1;
                transform: translate(100px, -100px) scale(1.2) rotate(360deg);
            }
            100% {
                opacity: 0;
                transform: translate(200px, -200px) scale(0.5) rotate(720deg);
            }
        }
        
        .omega {
            position: fixed !important;
            bottom: 10px;
            left: 10px;
            font-size: 0.9em;
            color: #B0B0B0;
        }
        
        canvas {
            background-color: #2a2a2a;
            border-radius: 8px;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>
    <h1>MGSV Recruit Generator</h1>

    <div style="text-align: center;">
        <button onclick="generateAndDisplayRecruit()">Generate Recruit</button>
        <div class="form-group d-inline-block">
            <select id="diceSelect" class="form-select d-inline-block w-auto">
                <option selected disabled>🎲 Select Dice</option>
                <option value="6">6-sided</option>
                <option value="10">10-sided</option>
                <option value="21">21-sided</option>
            </select>
        </div>
        <button onclick="rollDiceFromSelect()">Roll</button>
    </div>

    <div class="split-layout">
        <div id="leftPanel">
            <h2>Stat Summary</h2>
            <div id="statTotals">
                <p>Combat: 0</p>
                <p>R&D: 0</p>
                <p>Development: 0</p>
                <p>Support: 0</p>
                <p>Intel: 0</p>
                <p>Medical: 0</p>
                <p><strong>Total Recruits: 0</strong></p>
            </div>
            <canvas id="statsChart" width="300" height="200"></canvas>
            <audio autoplay controls loop style="width: 100%;" crossorigin="anonymous">
                <source src="https://joeldom.github.io/asset/audio/songs/AFX-215061.mp3" type="audio/mp3">
            </audio>
            <iframe width="100%" height="200" src="https://www.youtube.com/embed/2eEuWXdaWic?autoplay=1&mute=1" title="Mother Base" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin"
                allowfullscreen></iframe>
        </div>

        <div id="rightPanel">
            <div id="recruitOutput"></div>
        </div>
    </div>

    <!-- Toast Alert -->
    <div id="snackbar" class="toast position-fixed bottom-0 end-0 p-3" role="alert" aria-live="assertive" aria-atomic="true" style="display: none;">
        <div class="toast-header">
            <strong class="me-auto">Alert</strong>
            <small></small>
            <button type="button" class="btn-close" data-bs-dismiss="toast" aria-label="Close"></button>
        </div>
        <div class="toast-body" id="snackbarMessage"></div>
    </div>

    <p class="omega"><a href="https://joeldom.github.io/redesign/">Joel Dombek</a> © X.X.MMXXV <a href="https://joeldom.github.io/redesign/sandbox/#login">v1</a></p>

    <div class="firefly"></div>
    <div class="firefly"></div>
    <div class="firefly"></div>
    <div class="firefly"></div>
    <div class="firefly"></div>

    <script>
        const statTotals = {
            Combat: 0,
            R_D: 0,
            Base_Development: 0,
            Support: 0,
            Intel: 0,
            Medical: 0
        };
        let totalRecruits = 0;
        let statsChart;
        let toastInstance;

        function initChart() {
            const ctx = document.getElementById('statsChart').getContext('2d');
            statsChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['Combat', 'R&D', 'Development', 'Support', 'Intel', 'Medical'],
                    datasets: [{
                        label: 'Total Stat Values',
                        data: [0, 0, 0, 0, 0, 0],
                        backgroundColor: '#3C89FF'
                    }]
                },
                options: {
                    scales: {
                        y: {
                            beginAtZero: true
                        }
                    }
                }
            });
        }

        function updateChart() {
            statsChart.data.datasets[0].data = [
                statTotals.Combat,
                statTotals.R_D,
                statTotals.Base_Development,
                statTotals.Support,
                statTotals.Intel,
                statTotals.Medical
            ];
            statsChart.update();
        }

        function renderStatTotals() {
            document.getElementById('statTotals').innerHTML = `
                <p>Combat: ${statTotals.Combat}</p>
                <p>R&D: ${statTotals.R_D}</p>
                <p>Development: ${statTotals.Base_Development}</p>
                <p>Support: ${statTotals.Support}</p>
                <p>Intel: ${statTotals.Intel}</p>
                <p>Medical: ${statTotals.Medical}</p>
                <p><strong>Total Recruits: ${totalRecruits}</strong></p>
            `;
        }

        function getGrade(statValue) {
            const grades = [{
                grade: "E",
                class: "grade0"
            }, {
                grade: "D",
                class: "grade1"
            }, {
                grade: "C",
                class: "grade2"
            }, {
                grade: "B",
                class: "grade3"
            }, {
                grade: "A",
                class: "grade4"
            }, {
                grade: "A+",
                class: "grade5"
            }, {
                grade: "A++",
                class: "grade6"
            }, {
                grade: "S",
                class: "grade7"
            }, {
                grade: "S+",
                class: "grade8"
            }, {
                grade: "S++",
                class: "grade9"
            }];
            return grades[Math.max(0, Math.min(statValue - 1, 9))];
        }

        function generateStats() {
            return {
                Combat: Math.floor(Math.random() * 10) + 1,
                R_D: Math.floor(Math.random() * 10) + 1,
                Base_Development: Math.floor(Math.random() * 10) + 1,
                Support: Math.floor(Math.random() * 10) + 1,
                Intel: Math.floor(Math.random() * 10) + 1,
                Medical: Math.floor(Math.random() * 10) + 1
            };
        }

        function generateAndDisplayRecruit() {
            const stats = generateStats();
            const grades = {
                Combat: getGrade(stats.Combat),
                R_D: getGrade(stats.R_D),
                Base_Development: getGrade(stats.Base_Development),
                Support: getGrade(stats.Support),
                Intel: getGrade(stats.Intel),
                Medical: getGrade(stats.Medical)
            };
            const averageValue = Math.round(Object.values(stats).reduce((a, b) => a + b, 0) / 6);
            const overall = getGrade(averageValue);

            const recruitDiv = document.createElement('div');
            recruitDiv.className = 'recruit';
            recruitDiv.innerHTML = `
                <div class="recruit-info"><strong>Random Recruit</strong></div>
                <div class="stat">Combat: <strong><span class="${grades.Combat.class}" title="${stats.Combat}">${grades.Combat.grade}</span></strong></div>
                <div class="stat">R&D: <strong><span class="${grades.R_D.class}" title="${stats.R_D}">${grades.R_D.grade}</span></strong></div>
                <div class="stat">Development: <strong><span class="${grades.Base_Development.class}" title="${stats.Base_Development}">${grades.Base_Development.grade}</span></strong></div>
                <div class="stat">Support: <strong><span class="${grades.Support.class}" title="${stats.Support}">${grades.Support.grade}</span></strong></div>
                <div class="stat">Intel: <strong><span class="${grades.Intel.class}" title="${stats.Intel}">${grades.Intel.grade}</span></strong></div>
                <div class="stat">Medical: <strong><span class="${grades.Medical.class}" title="${stats.Medical}">${grades.Medical.grade}</span></strong></div>
                <div class="stat rank"><small>Overall</small><strong><span class="${overall.class}" title="${averageValue}">${overall.grade}</span></strong></div>
            `;

            document.getElementById('recruitOutput').prepend(recruitDiv);
            for (const stat in stats) statTotals[stat] += stats[stat];
            totalRecruits++;
            renderStatTotals();
            updateChart();
        }

        function rollDiceFromSelect() {
            const diceSelect = document.getElementById('diceSelect');
            const diceSides = parseInt(diceSelect.value);
            if (![6, 10, 21].includes(diceSides)) {
                showToast("Please select a valid dice size.");
                return;
            }
            rollDice(diceSides);
        }

        function rollDice(sides) {
            const playerRoll = Math.floor(Math.random() * sides) + 1;
            const aiRoll = Math.floor(Math.random() * sides) + 1;
            let recruitChange = 0;
            let message = "";

            if (playerRoll > aiRoll) {
                recruitChange = sides;
                message = `🎲 You rolled ${playerRoll}, AI rolled ${aiRoll}. You win +${sides} recruits!`;
            } else if (playerRoll < aiRoll) {
                recruitChange = -sides;
                message = `🎲 You rolled ${playerRoll}, AI rolled ${aiRoll}. You lose ${sides} recruits.`;
            } else {
                message = `🎲 Tie! You rolled ${playerRoll}, AI rolled ${aiRoll}. No change.`;
            }

            totalRecruits += recruitChange;
            renderStatTotals();
            updateChart();
            showToast(message);
        }

        function showToast(message) {
            const toastEl = document.getElementById('snackbar');
            document.getElementById('snackbarMessage').innerText = message;
            const toast = new bootstrap.Toast(toastEl);
            toast.show();
        }

        window.onload = initChart;
    </script>
</body>

</html>
