<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vibe Selector</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0a0a;
            color: white;
            min-height: 100vh;
            overflow: hidden;
        }
        
        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            transition: opacity 0.5s ease;
        }
        
        .hidden {
            opacity: 0;
            pointer-events: none;
        }
        
        h1 {
            font-size: 2.5rem;
            margin-bottom: 2rem;
            text-align: center;
        }
        
        h2 {
            font-size: 1.5rem;
            margin-bottom: 2rem;
            text-align: center;
            opacity: 0.8;
        }
        
        .emoji-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1rem;
            max-width: 500px;
            margin: 0 auto;
        }
        
        .emoji-option {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid transparent;
            border-radius: 1rem;
            padding: 1.5rem;
            font-size: 2.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
        }
        
        .emoji-option:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }
        
        .emoji-option.selected {
            border-color: #fff;
            background: rgba(255, 255, 255, 0.3);
        }
        
        .emoji-label {
            font-size: 0.9rem;
            opacity: 0.8;
            text-align: center;
        }
        
        .button {
            background: white;
            color: black;
            border: none;
            padding: 1rem 2rem;
            border-radius: 2rem;
            font-size: 1.1rem;
            cursor: pointer;
            margin-top: 2rem;
            transition: all 0.3s ease;
        }
        
        .button:hover {
            transform: scale(1.05);
            background: #f0f0f0;
        }
        
        .button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        .player-screen {
            background: linear-gradient(135deg, var(--gradient-start, #667eea), var(--gradient-end, #764ba2));
        }
        
        .video-container {
            width: 100%;
            height: 100%;
            position: relative;
        }
        
        #youtube-player {
            width: 100%;
            height: 100%;
            border: none;
        }
        
        .player-controls {
            position: absolute;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 1rem;
        }
        
        .back-button {
            background: rgba(0, 0, 0, 0.7);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        
        .setup-screen {
            background: #1a1a1a;
        }
        
        .url-input {
            width: 100%;
            max-width: 400px;
            padding: 1rem;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 0.5rem;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 1rem;
            margin-bottom: 1rem;
        }
        
        .url-input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }
        
        .track-list {
            width: 100%;
            max-width: 500px;
            margin: 2rem 0;
        }
        
        .track-item {
            background: rgba(255, 255, 255, 0.1);
            padding: 1rem;
            border-radius: 0.5rem;
            margin-bottom: 0.5rem;
            display: flex;
            justify-content: between;
            align-items: center;
        }
        
        .track-info {
            flex: 1;
        }
        
        .track-name {
            font-weight: bold;
            margin-bottom: 0.25rem;
        }
        
        .track-url {
            font-size: 0.8rem;
            opacity: 0.7;
            word-break: break-all;
        }
        
        .delete-button {
            background: #ff4757;
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 0.25rem;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <!-- Question 1 Screen -->
    <div id="question1Screen" class="screen">
        <h1>What is your vibe?</h1>
        <div class="emoji-grid" id="vibeCurrentGrid">
            <!-- Emoji options will be populated by JavaScript -->
        </div>
        <button class="button" id="nextToQuestion2">Next</button>
    </div>

    <!-- Question 2 Screen -->
    <div id="question2Screen" class="screen hidden">
        <h1>What do you want your vibe to be?</h1>
        <div class="emoji-grid" id="vibeTargetGrid">
            <!-- Emoji options will be populated by JavaScript -->
        </div>
        <button class="button" id="playVibe" disabled>Play Vibe</button>
    </div>

    <!-- Player Screen -->
    <div id="playerScreen" class="screen hidden player-screen">
        <div class="video-container">
            <iframe id="youtube-player" src="" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
        </div>
        <div class="player-controls">
            <button class="button back-button" id="backFromPlayer">Back to Selection</button>
            <button class="button back-button" id="setupButton">Setup</button>
        </div>
    </div>

    <!-- Setup Screen -->
    <div id="setupScreen" class="screen hidden setup-screen">
        <h1>Setup Custom Tracks</h1>
        <input type="text" class="url-input" id="trackUrl" placeholder="Paste YouTube URL or search term">
        <select class="url-input" id="trackColor">
            <option value="white">White</option>
            <option value="pink">Pink</option>
            <option value="brown">Brown</option>
            <option value="blue">Blue</option>
            <option value="violet">Violet</option>
            <option value="grey">Grey</option>
            <option value="green">Green</option>
            <option value="black">Black</option>
        </select>
        <button class="button" id="addTrack">Add Track</button>

        <div class="track-list" id="customTracksList">
            <!-- Custom tracks will be listed here -->
        </div>

        <button class="button back-button" id="backFromSetup">Back to Player</button>
    </div>

    <script>
        // Frequency data and configuration
        const frequencyData = {
            white: {
                emoji: "⚪",
                name: "White",
                description: "Static-like, masking background noise",
                gradientStart: "#f8f9fa",
                gradientEnd: "#e9ecef",
                defaultSearch: "white noise sleep focus"
            },
            pink: {
                emoji: "🎀",
                name: "Pink",
                description: "Softer, deeper - rain, wind, heartbeat",
                gradientStart: "#ffafbd",
                gradientEnd: "#ffc3a0",
                defaultSearch: "pink noise relaxation sleep"
            },
            brown: {
                emoji: "🟤",
                name: "Brown",
                description: "Very deep, rumbly - thunder, river",
                gradientStart: "#8B4513",
                gradientEnd: "#A0522D",
                defaultSearch: "brown noise deep relaxation"
            },
            blue: {
                emoji: "🔵",
                name: "Blue",
                description: "Hissier, brighter than white",
                gradientStart: "#667eea",
                gradientEnd: "#764ba2",
                defaultSearch: "blue noise tinnitus"
            },
            violet: {
                emoji: "🟣",
                name: "Violet",
                description: "Very high-pitched hiss",
                gradientStart: "#6a11cb",
                gradientEnd: "#2575fc",
                defaultSearch: "violet noise audio testing"
            },
            grey: {
                emoji: "⚫",
                name: "Grey",
                description: "Equal perceived loudness",
                gradientStart: "#2c3e50",
                gradientEnd: "#3498db",
                defaultSearch: "grey noise office masking"
            },
            green: {
                emoji: "💚",
                name: "Green",
                description: "Nature-like - streams, forest",
                gradientStart: "#56ab2f",
                gradientEnd: "#a8e6cf",
                defaultSearch: "green noise nature sounds"
            },
            black: {
                emoji: "⚫",
                name: "Black",
                description: "Silence or specific frequencies",
                gradientStart: "#000000",
                gradientEnd: "#434343",
                defaultSearch: "black silence binaural beats"
            }
        };

        // App state
        let currentSelections = {
            currentVibe: null,
            targetVibe: null
        };

        let customTracks = JSON.parse(localStorage.getItem('customTracks') || '{}');

        // Initialize the app
        function init() {
            createEmojiGrids();
            setupEventListeners();
            loadCustomTracks();
        }

        // Create emoji selection grids
        function createEmojiGrids() {
            const vibeCurrentGrid = document.getElementById('vibeCurrentGrid');
            const vibeTargetGrid = document.getElementById('vibeTargetGrid');

            Object.entries(frequencyData).forEach(([key, data]) => {
                const option = createEmojiOption(key, data);
                vibeCurrentGrid.appendChild(option.cloneNode(true));
                vibeTargetGrid.appendChild(option);
            });
        }

        // Create individual emoji option
        function createEmojiOption(key, data) {
            const div = document.createElement('div');
            div.className = 'emoji-option';
            div.dataset.vibe = key;
            div.innerHTML = `
                <span>${data.emoji}</span>
                <div class="emoji-label">${data.name}</div>
            `;
            return div;
        }

        // Setup all event listeners
        function setupEventListeners() {
            // Question 1 navigation
            document.getElementById('nextToQuestion2').addEventListener('click', () => {
                showScreen('question2Screen');
            });

            // Question 2 navigation
            document.getElementById('playVibe').addEventListener('click', () => {
                playSelectedVibe();
            });

            // Player controls
            document.getElementById('backFromPlayer').addEventListener('click', () => {
                showScreen('question2Screen');
            });

            document.getElementById('setupButton').addEventListener('click', () => {
                showScreen('setupScreen');
            });

            // Setup screen controls
            document.getElementById('backFromSetup').addEventListener('click', () => {
                showScreen('playerScreen');
            });

            document.getElementById('addTrack').addEventListener('click', addCustomTrack);

            // Emoji selection
            document.querySelectorAll('.emoji-option').forEach(option => {
                option.addEventListener('click', handleEmojiSelection);
            });
        }

        // Handle emoji selection
        function handleEmojiSelection(event) {
            const option = event.currentTarget;
            const vibeType = option.dataset.vibe;
            const screenId = option.closest('.screen').id;

            // Clear previous selection in this screen
            option.closest('.emoji-grid').querySelectorAll('.emoji-option').forEach(opt => {
                opt.classList.remove('selected');
            });

            // Set new selection
            option.classList.add('selected');

            // Update state based on which screen
            if (screenId === 'question1Screen') {
                currentSelections.currentVibe = vibeType;
            } else if (screenId === 'question2Screen') {
                currentSelections.targetVibe = vibeType;
                document.getElementById('playVibe').disabled = false;
            }
        }

        // Show specific screen
        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(screen => {
                screen.classList.add('hidden');
            });
            document.getElementById(screenId).classList.remove('hidden');
        }

        // Play selected vibe
        function playSelectedVibe() {
            const vibe = currentSelections.targetVibe;
            const data = frequencyData[vibe];

            // Set gradient
            const playerScreen = document.getElementById('playerScreen');
            playerScreen.style.setProperty('--gradient-start', data.gradientStart);
            playerScreen.style.setProperty('--gradient-end', data.gradientEnd);

            // Load YouTube video
            loadYouTubeVideo(vibe);

            showScreen('playerScreen');
        }

        // Load YouTube video based on vibe
        function loadYouTubeVideo(vibe) {
            const player = document.getElementById('youtube-player');
            let videoId = '';

            // Check for custom track first
            if (customTracks[vibe]) {
                videoId = extractYouTubeId(customTracks[vibe]);
            }

            // If no custom track or invalid, use default search
            if (!videoId) {
                const searchQuery = frequencyData[vibe].defaultSearch;
                // For MVP, we'll use a placeholder - in production you'd use YouTube API
                videoId = 'jNQXAC9IVRw'; // Placeholder - first YouTube video
            }

            player.src = `https://www.youtube.com/embed/${videoId}?autoplay=1&controls=0&showinfo=0&rel=0`;
        }

        // Extract YouTube ID from URL
        function extractYouTubeId(url) {
            const regex = /(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=)|youtu\.be\/)([^"&?\/\s]{11})/;
            const match = url.match(regex);
            return match ? match[1] : null;
        }

        // Custom tracks management
        function loadCustomTracks() {
            const list = document.getElementById('customTracksList');
            list.innerHTML = '';

            Object.entries(customTracks).forEach(([color, url]) => {
                const item = document.createElement('div');
                item.className = 'track-item';
                item.innerHTML = `
                    <div class="track-info">
                        <div class="track-name">${frequencyData[color]?.name || color} Noise</div>
                        <div class="track-url">${url}</div>
                    </div>
                    <button class="delete-button" data-color="${color}">Delete</button>
                `;
                list.appendChild(item);
            });

            // Add delete event listeners
            document.querySelectorAll('.delete-button').forEach(button => {
                button.addEventListener('click', (e) => {
                    const color = e.target.dataset.color;
                    delete customTracks[color];
                    localStorage.setItem('customTracks', JSON.stringify(customTracks));
                    loadCustomTracks();
                });
            });
        }

        function addCustomTrack() {
            const url = document.getElementById('trackUrl').value.trim();
            const color = document.getElementById('trackColor').value;

            if (!url) return;

            // Validate YouTube URL or treat as search term
            let finalUrl = url;
            if (!url.includes('youtube.com') && !url.includes('youtu.be')) {
                // Treat as search term - encode for YouTube URL
                finalUrl = `https://www.youtube.com/results?search_query=${encodeURIComponent(url + ' noise')}`;
            }

            customTracks[color] = finalUrl;
            localStorage.setItem('customTracks', JSON.stringify(customTracks));

            document.getElementById('trackUrl').value = '';
            loadCustomTracks();
        }

        // Initialize app when DOM is loaded
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>

</html>
