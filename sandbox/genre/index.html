<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vibe Selector</title>
    <style>
        /* Previous CSS remains the same */
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0a0a;
            color: white;
            min-height: 100vh;
            overflow: hidden;
        }
        
        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            transition: opacity 0.5s ease;
        }
        
        .hidden {
            opacity: 0;
            pointer-events: none;
        }
        
        h1 {
            font-size: 2.5rem;
            margin-bottom: 2rem;
            text-align: center;
        }
        
        h2 {
            font-size: 1.5rem;
            margin-bottom: 2rem;
            text-align: center;
            opacity: 0.8;
        }
        
        .emoji-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1rem;
            max-width: 500px;
            margin: 0 auto;
        }
        
        .emoji-option {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid transparent;
            border-radius: 1rem;
            padding: 1.5rem;
            font-size: 2.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
        }
        
        .emoji-option:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }
        
        .emoji-option.selected {
            border-color: #fff;
            background: rgba(255, 255, 255, 0.3);
        }
        
        .emoji-label {
            font-size: 0.9rem;
            opacity: 0.8;
            text-align: center;
        }
        
        .button {
            background: white;
            color: black;
            border: none;
            padding: 1rem 2rem;
            border-radius: 2rem;
            font-size: 1.1rem;
            cursor: pointer;
            margin-top: 2rem;
            transition: all 0.3s ease;
        }
        
        .button:hover {
            transform: scale(1.05);
            background: #f0f0f0;
        }
        
        .button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        .player-screen {
            background: linear-gradient(135deg, var(--gradient-start, #667eea), var(--gradient-end, #764ba2));
        }
        
        .video-container {
            width: 100%;
            height: 100%;
            position: relative;
        }
        
        #youtube-player {
            width: 100%;
            height: 100%;
            border: none;
        }
        
        .fallback-audio {
            display: none;
            width: 100%;
            max-width: 300px;
            margin-top: 2rem;
        }
        
        .player-controls {
            position: absolute;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 1rem;
        }
        
        .back-button {
            background: rgba(0, 0, 0, 0.7);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        
        .setup-screen {
            background: #1a1a1a;
        }
        
        .url-input {
            width: 100%;
            max-width: 400px;
            padding: 1rem;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 0.5rem;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 1rem;
            margin-bottom: 1rem;
        }
        
        .url-input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }
        
        .track-list {
            width: 100%;
            max-width: 500px;
            margin: 2rem 0;
        }
        
        .track-item {
            background: rgba(255, 255, 255, 0.1);
            padding: 1rem;
            border-radius: 0.5rem;
            margin-bottom: 0.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .track-info {
            flex: 1;
        }
        
        .track-name {
            font-weight: bold;
            margin-bottom: 0.25rem;
        }
        
        .track-url {
            font-size: 0.8rem;
            opacity: 0.7;
            word-break: break-all;
        }
        
        .delete-button {
            background: #ff4757;
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 0.25rem;
            cursor: pointer;
        }
        
        .error-message {
            color: #ff6b6b;
            margin-top: 1rem;
            text-align: center;
        }
        
        .debug-info {
            position: fixed;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.8);
            padding: 10px;
            border-radius: 5px;
            font-size: 12px;
            max-width: 300px;
        }
    </style>
</head>

<body>
    <!-- Debug info -->
    <div class="debug-info" id="debugInfo"></div>

    <!-- Question 1 Screen -->
    <div id="question1Screen" class="screen">
        <h1>What is your vibe?</h1>
        <div class="emoji-grid" id="vibeCurrentGrid">
            <!-- Emoji options will be populated by JavaScript -->
        </div>
        <button class="button" id="nextToQuestion2">Next</button>
    </div>

    <!-- Question 2 Screen -->
    <div id="question2Screen" class="screen hidden">
        <h1>What do you want your vibe to be?</h1>
        <div class="emoji-grid" id="vibeTargetGrid">
            <!-- Emoji options will be populated by JavaScript -->
        </div>
        <button class="button" id="playVibe" disabled>Play Vibe</button>
    </div>

    <!-- Player Screen -->
    <div id="playerScreen" class="screen hidden player-screen">
        <div class="video-container">
            <iframe id="youtube-player" src="" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
            <audio id="fallback-audio" class="fallback-audio" controls>
                Your browser does not support the audio element.
            </audio>
        </div>
        <div class="error-message" id="playerError"></div>
        <div class="player-controls">
            <button class="button back-button" id="backFromPlayer">Back to Selection</button>
            <button class="button back-button" id="setupButton">Setup</button>
            <button class="button back-button" id="tryFallback">Try Audio Fallback</button>
        </div>
    </div>

    <!-- Setup Screen -->
    <div id="setupScreen" class="screen hidden setup-screen">
        <h1>Setup Custom Tracks</h1>
        <input type="text" class="url-input" id="trackUrl" placeholder="Paste YouTube URL or YouTube Video ID">
        <select class="url-input" id="trackColor">
            <option value="white">White</option>
            <option value="pink">Pink</option>
            <option value="brown">Brown</option>
            <option value="blue">Blue</option>
            <option value="violet">Violet</option>
            <option value="grey">Grey</option>
            <option value="green">Green</option>
            <option value="black">Black</option>
        </select>
        <button class="button" id="addTrack">Add Track</button>

        <div class="track-list" id="customTracksList">
            <!-- Custom tracks will be listed here -->
        </div>

        <button class="button back-button" id="backFromSetup">Back to Player</button>
    </div>

    <script>
        // Enhanced frequency data with known working YouTube IDs for noise videos
        const frequencyData = {
            white: {
                emoji: "⚪",
                name: "White",
                description: "Static-like, masking background noise",
                gradientStart: "#f8f9fa",
                gradientEnd: "#e9ecef",
                defaultVideoId: "nMfPqeZjc2c", // Known working white noise video
                fallbackAudio: "https://www.soundjay.com/misc/sounds/white-noise.mp3"
            },
            pink: {
                emoji: "🎀",
                name: "Pink",
                description: "Softer, deeper - rain, wind, heartbeat",
                gradientStart: "#ffafbd",
                gradientEnd: "#ffc3a0",
                defaultVideoId: "HRE4WxY1uKs", // Known working pink noise video
                fallbackAudio: "https://www.soundjay.com/misc/sounds/pink-noise.mp3"
            },
            brown: {
                emoji: "🟤",
                name: "Brown",
                description: "Very deep, rumbly - thunder, river",
                gradientStart: "#8B4513",
                gradientEnd: "#A0522D",
                defaultVideoId: "ncM3BJBdK1g", // Known working brown noise video
                fallbackAudio: "https://www.soundjay.com/misc/sounds/brown-noise.mp3"
            },
            blue: {
                emoji: "🔵",
                name: "Blue",
                description: "Hissier, brighter than white",
                gradientStart: "#667eea",
                gradientEnd: "#764ba2",
                defaultVideoId: "WpFCTzToqmA", // Blue noise example
                fallbackAudio: "https://assets.mixkit.co/active_storage/sfx/005/005-preview.mp3"
            },
            violet: {
                emoji: "🟣",
                name: "Violet",
                description: "Very high-pitched hiss",
                gradientStart: "#6a11cb",
                gradientEnd: "#2575fc",
                defaultVideoId: "w4t3HJwTrgs", // Violet noise example
                fallbackAudio: "https://assets.mixkit.co/active_storage/sfx/006/006-preview.mp3"
            },
            grey: {
                emoji: "⚫",
                name: "Grey",
                description: "Equal perceived loudness",
                gradientStart: "#2c3e50",
                gradientEnd: "#3498db",
                defaultVideoId: "zNfPSb4Q6o0", // Grey noise example
                fallbackAudio: "https://assets.mixkit.co/active_storage/sfx/007/007-preview.mp3"
            },
            green: {
                emoji: "💚",
                name: "Green",
                description: "Nature-like - streams, forest",
                gradientStart: "#56ab2f",
                gradientEnd: "#a8e6cf",
                defaultVideoId: "yIQd2Ya0Ziw", // Forest sounds
                fallbackAudio: "https://assets.mixkit.co/active_storage/sfx/250/250-preview.mp3"
            },
            black: {
                emoji: "⚫",
                name: "Black",
                description: "Silence or specific frequencies",
                gradientStart: "#000000",
                gradientEnd: "#434343",
                defaultVideoId: "5qap5aO4i9A", // Lofi hip hop (silence alternative)
                fallbackAudio: "https://assets.mixkit.co/active_storage/sfx/009/009-preview.mp3"
            }
        };

        // App state
        let currentSelections = {
            currentVibe: null,
            targetVibe: null
        };

        let customTracks = JSON.parse(localStorage.getItem('customTracks') || '{}');

        // Initialize the app
        function init() {
            createEmojiGrids();
            setupEventListeners();
            loadCustomTracks();
            updateDebugInfo('App initialized');
        }

        // Create emoji selection grids
        function createEmojiGrids() {
            const vibeCurrentGrid = document.getElementById('vibeCurrentGrid');
            const vibeTargetGrid = document.getElementById('vibeTargetGrid');

            Object.entries(frequencyData).forEach(([key, data]) => {
                const option = createEmojiOption(key, data);
                vibeCurrentGrid.appendChild(option.cloneNode(true));
                vibeTargetGrid.appendChild(option);
            });
        }

        // Create individual emoji option
        function createEmojiOption(key, data) {
            const div = document.createElement('div');
            div.className = 'emoji-option';
            div.dataset.vibe = key;
            div.innerHTML = `
                <span>${data.emoji}</span>
                <div class="emoji-label">${data.name}</div>
            `;
            return div;
        }

        // Setup all event listeners
        function setupEventListeners() {
            // Question 1 navigation
            document.getElementById('nextToQuestion2').addEventListener('click', () => {
                showScreen('question2Screen');
            });

            // Question 2 navigation
            document.getElementById('playVibe').addEventListener('click', () => {
                playSelectedVibe();
            });

            // Player controls
            document.getElementById('backFromPlayer').addEventListener('click', () => {
                stopPlayback();
                showScreen('question2Screen');
            });

            document.getElementById('setupButton').addEventListener('click', () => {
                showScreen('setupScreen');
            });

            document.getElementById('tryFallback').addEventListener('click', () => {
                useAudioFallback();
            });

            // Setup screen controls
            document.getElementById('backFromSetup').addEventListener('click', () => {
                showScreen('playerScreen');
            });

            document.getElementById('addTrack').addEventListener('click', addCustomTrack);

            // Emoji selection
            document.querySelectorAll('.emoji-option').forEach(option => {
                option.addEventListener('click', handleEmojiSelection);
            });

            // YouTube player event listeners
            const player = document.getElementById('youtube-player');
            player.addEventListener('load', () => {
                updateDebugInfo('YouTube player loaded');
            });

            player.addEventListener('error', (e) => {
                updateDebugInfo('YouTube player error: ' + e);
                showPlayerError('YouTube failed to load. Try fallback audio.');
            });
        }

        // Handle emoji selection
        function handleEmojiSelection(event) {
            const option = event.currentTarget;
            const vibeType = option.dataset.vibe;
            const screenId = option.closest('.screen').id;

            // Clear previous selection in this screen
            option.closest('.emoji-grid').querySelectorAll('.emoji-option').forEach(opt => {
                opt.classList.remove('selected');
            });

            // Set new selection
            option.classList.add('selected');

            // Update state based on which screen
            if (screenId === 'question1Screen') {
                currentSelections.currentVibe = vibeType;
            } else if (screenId === 'question2Screen') {
                currentSelections.targetVibe = vibeType;
                document.getElementById('playVibe').disabled = false;
            }
        }

        // Show specific screen
        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(screen => {
                screen.classList.add('hidden');
            });
            document.getElementById(screenId).classList.remove('hidden');
        }

        // Play selected vibe
        function playSelectedVibe() {
            const vibe = currentSelections.targetVibe;
            const data = frequencyData[vibe];

            // Set gradient
            const playerScreen = document.getElementById('playerScreen');
            playerScreen.style.setProperty('--gradient-start', data.gradientStart);
            playerScreen.style.setProperty('--gradient-end', data.gradientEnd);

            // Clear previous errors
            document.getElementById('playerError').textContent = '';

            // Load YouTube video
            loadYouTubeVideo(vibe);

            showScreen('playerScreen');
        }

        // Enhanced YouTube video loading
        function loadYouTubeVideo(vibe) {
            const player = document.getElementById('youtube-player');
            const fallbackAudio = document.getElementById('fallback-audio');
            let videoId = '';

            updateDebugInfo(`Loading vibe: ${vibe}`);

            // Hide fallback audio initially
            fallbackAudio.style.display = 'none';
            player.style.display = 'block';

            // Check for custom track first
            if (customTracks[vibe]) {
                videoId = extractYouTubeId(customTracks[vibe]);
                updateDebugInfo(`Custom track found: ${videoId}`);
            }

            // If no custom track or invalid, use default video ID
            if (!videoId) {
                videoId = frequencyData[vibe].defaultVideoId;
                updateDebugInfo(`Using default video: ${videoId}`);
            }

            // Enhanced YouTube embed URL with better parameters
            const embedUrl = `https://www.youtube.com/embed/${videoId}?` + new URLSearchParams({
                autoplay: 1,
                mute: 0, // Start unmuted for better UX
                loop: 1,
                playlist: videoId, // Required for loop to work
                enablejsapi: 1,
                origin: window.location.origin,
                widget_referrer: window.location.href,
                rel: 0, // Don't show related videos
                modestbranding: 1, // Less YouTube branding
                controls: 0, // Hide controls for cleaner look
                iv_load_policy: 3, // Hide annotations
                disablekb: 1 // Disable keyboard controls
            });

            player.src = embedUrl;
            updateDebugInfo(`YouTube URL set: ${embedUrl.substring(0, 100)}...`);

            // Preload fallback audio
            fallbackAudio.src = frequencyData[vibe].fallbackAudio;
        }

        // Use audio fallback
        function useAudioFallback() {
            const vibe = currentSelections.targetVibe;
            const player = document.getElementById('youtube-player');
            const fallbackAudio = document.getElementById('fallback-audio');

            player.style.display = 'none';
            fallbackAudio.style.display = 'block';
            fallbackAudio.play().catch(e => {
                updateDebugInfo('Fallback audio error: ' + e);
                showPlayerError('Fallback audio also failed. Please check your audio settings.');
            });
        }

        // Stop all playback
        function stopPlayback() {
            const player = document.getElementById('youtube-player');
            const fallbackAudio = document.getElementById('fallback-audio');

            // Stop YouTube (by removing src)
            player.src = '';

            // Stop audio
            fallbackAudio.pause();
            fallbackAudio.currentTime = 0;
        }

        // Extract YouTube ID from URL
        function extractYouTubeId(url) {
            // If it's already just an ID (11 characters, no special chars)
            if (/^[a-zA-Z0-9_-]{11}$/.test(url)) {
                return url;
            }

            const regex = /(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=)|youtu\.be\/)([^"&?\/\s]{11})/;
            const match = url.match(regex);
            return match ? match[1] : null;
        }

        // Show player error
        function showPlayerError(message) {
            document.getElementById('playerError').textContent = message;
        }

        // Update debug info
        function updateDebugInfo(message) {
            const debugEl = document.getElementById('debugInfo');
            const timestamp = new Date().toLocaleTimeString();
            debugEl.innerHTML = `<div>${timestamp}: ${message}</div>` + debugEl.innerHTML;
        }

        // Custom tracks management
        function loadCustomTracks() {
            const list = document.getElementById('customTracksList');
            list.innerHTML = '';

            Object.entries(customTracks).forEach(([color, url]) => {
                const item = document.createElement('div');
                item.className = 'track-item';
                item.innerHTML = `
                    <div class="track-info">
                        <div class="track-name">${frequencyData[color]?.name || color} Noise</div>
                        <div class="track-url">${url}</div>
                    </div>
                    <button class="delete-button" data-color="${color}">Delete</button>
                `;
                list.appendChild(item);
            });

            // Add delete event listeners
            document.querySelectorAll('.delete-button').forEach(button => {
                button.addEventListener('click', (e) => {
                    const color = e.target.dataset.color;
                    delete customTracks[color];
                    localStorage.setItem('customTracks', JSON.stringify(customTracks));
                    loadCustomTracks();
                });
            });
        }

        function addCustomTrack() {
            const url = document.getElementById('trackUrl').value.trim();
            const color = document.getElementById('trackColor').value;

            if (!url) return;

            // Validate it's a YouTube ID or URL
            const videoId = extractYouTubeId(url);
            if (!videoId && !/^[a-zA-Z0-9_-]{11}$/.test(url)) {
                alert('Please enter a valid YouTube URL or Video ID (11 characters)');
                return;
            }

            // Store the YouTube ID directly for better reliability
            customTracks[color] = videoId || url;
            localStorage.setItem('customTracks', JSON.stringify(customTracks));

            document.getElementById('trackUrl').value = '';
            loadCustomTracks();
            updateDebugInfo(`Added custom track for ${color}: ${customTracks[color]}`);
        }

        // Initialize app when DOM is loaded
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>

</html>
