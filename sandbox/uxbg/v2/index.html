    <style>
        .media-viewer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.6s ease;
        }
        .media-viewer.active { opacity: 1; }
        .media-viewer video, .media-viewer img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(0.7) contrast(1.1);
        }
        #collapse1 {
            position: relative;
            z-index: 2;
        }
        #collapse1 .row { transition: opacity 0.4s ease; }
        #collapse1.buttons-hidden .row {
            opacity: 0;
            pointer-events: none;
        }
        #collapse1.buttons-visible .row {
            opacity: 1;
            pointer-events: all;
        }
        .mouse-indicator {
            position: fixed;
            width: 20px;
            height: 20px;
            border: 2px solid #e0e9fe;
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            transition: transform 0.15s ease;
            opacity: 0;
            mix-blend-mode: difference;
        }
        .mouse-indicator.active { opacity: 1; }
    </style>

    <script>
        const CONFIG = {
            IDLE_DELAY: 2000,
            HIDE_BUTTONS_ON_IDLE: true,
            BUTTON_FADE_DURATION: 400
        };

        let idleTimer = null, isGifVisible = false, lastMouseMove = Date.now();
        const mediaViewer = document.getElementById('mediaViewer');
        const buttonContainer = document.getElementById('collapse1');
        const mouseIndicator = document.querySelector('.mouse-indicator');

        function handleMouseMove(e) {
            const x = e.clientX || (e.touches && e.touches[0].clientX);
            const y = e.clientY || (e.touches && e.touches[0].clientY);
            if (!x || !y) return;

            mouseIndicator.style.left = x + 'px';
            mouseIndicator.style.top = y + 'px';
            mouseIndicator.classList.add('active');
            lastMouseMove = Date.now();

            if (isGifVisible) hideGif();
            if (idleTimer) clearTimeout(idleTimer);
            idleTimer = setTimeout(showGif, CONFIG.IDLE_DELAY);
        }

        function showGif() {
            isGifVisible = true;
            mediaViewer.classList.add('active');
            if (CONFIG.HIDE_BUTTONS_ON_IDLE) {
                buttonContainer.classList.add('buttons-hidden');
                buttonContainer.classList.remove('buttons-visible');
            }
            const video = mediaViewer.querySelector('video');
            if (video) video.play().catch(err => console.log('Video autoplay prevented:', err));
        }

        function hideGif() {
            isGifVisible = false;
            mediaViewer.classList.remove('active');
            buttonContainer.classList.remove('buttons-hidden');
            buttonContainer.classList.add('buttons-visible');
            const video = mediaViewer.querySelector('video');
            if (video) video.pause();
        }

        function checkMouseIdle() {
            if (Date.now() - lastMouseMove > CONFIG.IDLE_DELAY + 1000) {
                mouseIndicator.classList.remove('active');
            }
        }

        document.addEventListener('mousemove', handleMouseMove);
        document.addEventListener('touchstart', handleMouseMove);
        document.addEventListener('touchmove', handleMouseMove);
        setInterval(checkMouseIdle, 500);
        idleTimer = setTimeout(showGif, CONFIG.IDLE_DELAY);

        window.switchToVideo = function(url) {
            mediaViewer.innerHTML = '<video loop muted playsinline><source src="' + url + '" type="video/mp4"></video>';
            if (isGifVisible) mediaViewer.querySelector('video').play();
        };

        window.switchToGif = function(url) {
            mediaViewer.innerHTML = '<img src="' + url + '" alt="Background media">';
        };

        window.addEventListener('beforeunload', () => { if (idleTimer) clearTimeout(idleTimer); });
        
        console.log('%c🎬 Interactive Background Viewer', 'font-size: 16px; font-weight: bold; color: #1a3acc;');
        console.log('Config:', CONFIG);
        console.log('Functions: switchToVideo("url"), switchToGif("url")');
    </script>
