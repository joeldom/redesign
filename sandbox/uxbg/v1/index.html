<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Background Media Viewer</title>
    <style>
        :root {
            --brand-blue: #1a3acc;
            --cool-blue: #e0e9fe;
            --dark-olive: #1a1e1c;
            --white: #ffffff;
            --ever-green: #142a2d;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Roboto', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            overflow-x: hidden;
        }

        /* Grid background pattern matching your site */
        .grid-bg {
            background-color: var(--ever-green);
            background-image: 
                linear-gradient(var(--brand-blue) 1px, transparent 1px),
                linear-gradient(90deg, var(--brand-blue) 1px, transparent 1px);
            background-size: 20px 20px;
            position: relative;
        }

        /* Media viewer layer - sits between background and content */
        .media-viewer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.6s ease;
        }

        .media-viewer.active {
            opacity: 1;
        }

        .media-viewer video,
        .media-viewer img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(0.7) contrast(1.1);
        }

        /* Content layer */
        .content-layer {
            position: relative;
            z-index: 2;
            min-height: 100vh;
        }

        /* Button rows container */
        .button-rows {
            padding: 60px 20px;
            transition: opacity 0.4s ease;
        }

        .button-rows.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .button-rows.visible {
            opacity: 1;
            pointer-events: all;
        }

        /* Tile splash styling matching your design */
        .tile-splash {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 2px solid var(--white);
            padding: 24px 32px;
            margin: 0 auto 24px;
            max-width: 600px;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .tile-splash:hover {
            background: rgba(255, 255, 255, 1);
            transform: translateX(4px);
            border-color: var(--brand-blue);
        }

        .tile-splash p {
            color: var(--brand-blue);
            font-size: 1.5rem;
            font-weight: 300;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .tile-splash strong {
            font-weight: 700;
        }

        .tile-splash svg {
            transition: transform 0.3s ease;
        }

        .tile-splash:hover svg {
            transform: translateX(4px);
        }

        .tile-detail {
            font-size: 0.75rem;
            opacity: 0.7;
            margin-left: 8px;
        }

        /* Mouse indicator */
        .mouse-indicator {
            position: fixed;
            width: 20px;
            height: 20px;
            border: 2px solid var(--cool-blue);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            transition: transform 0.15s ease;
            opacity: 0;
            mix-blend-mode: difference;
        }

        .mouse-indicator.active {
            opacity: 1;
        }

        /* Instructions overlay */
        .instructions {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(26, 58, 204, 0.9);
            backdrop-filter: blur(10px);
            color: var(--white);
            padding: 12px 24px;
            border-radius: 4px;
            z-index: 1000;
            font-size: 0.9rem;
            opacity: 0;
            animation: fadeInOut 4s ease forwards;
        }

        @keyframes fadeInOut {
            0%, 100% { opacity: 0; }
            10%, 90% { opacity: 1; }
        }

        /* Responsive adjustments */
        @media (max-width: 768px) {
            .tile-splash p {
                font-size: 1.2rem;
            }
            
            .button-rows {
                padding: 40px 15px;
            }
        }
    </style>
</head>
<body class="grid-bg">
    <!-- Instructions -->
    <div class="instructions">
        Buttons visible by default • GIF appears after 2 seconds of idle
    </div>

    <!-- Mouse indicator -->
    <div class="mouse-indicator"></div>

    <!-- Media viewer layer (between bg and content) -->
    <div class="media-viewer" id="mediaViewer">
        <!-- Start with a nature GIF, can be replaced with video -->
        <img src="https://media1.tenor.com/images/371f9f39bf86b53a2de6468e7bf142d4/tenor.gif" alt="Nature background">
    </div>

    <!-- Content layer with button rows -->
    <div class="content-layer">
        <div class="button-rows hidden" id="buttonRows">
            <section class="tile-splash">
                <a href="#" style="text-decoration: none;">
                    <p>
                        JOEL<strong>DOMBEK</strong> /名前
                        <svg focusable="false" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg" fill="currentColor" aria-hidden="true" width="20" height="20" viewBox="0 0 20 20">
                            <path d="M11.8 2.8L10.8 3.8 16.2 9.3 1 9.3 1 10.7 16.2 10.7 10.8 16.2 11.8 17.2 19 10z"></path>
                        </svg>
                    </p>
                </a>
            </section>

            <section class="tile-splash">
                <a href="#" style="text-decoration: none;">
                    <p>
                        WORK / 工作 <span class="tile-detail">v1.12.25</span>
                        <svg focusable="false" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg" fill="currentColor" aria-hidden="true" width="20" height="20" viewBox="0 0 20 20">
                            <path d="M11.8 2.8L10.8 3.8 16.2 9.3 1 9.3 1 10.7 16.2 10.7 10.8 16.2 11.8 17.2 19 10z"></path>
                        </svg>
                    </p>
                </a>
            </section>

            <section class="tile-splash">
                <a href="#" style="text-decoration: none;">
                    <p>
                        STYLE GUIDE / 样式指南 <span class="tile-detail">v2.1.25</span>
                        <svg focusable="false" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg" fill="currentColor" aria-hidden="true" width="20" height="20" viewBox="0 0 20 20">
                            <path d="M11.8 2.8L10.8 3.8 16.2 9.3 1 9.3 1 10.7 16.2 10.7 10.8 16.2 11.8 17.2 19 10z"></path>
                        </svg>
                    </p>
                </a>
            </section>

            <section class="tile-splash">
                <a href="#" style="text-decoration: none;">
                    <p>
                        SANDBOX / 沙盒 <span class="tile-detail">v1.2.17</span>
                        <svg focusable="false" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg" fill="currentColor" aria-hidden="true" width="20" height="20" viewBox="0 0 20 20">
                            <path d="M11.8 2.8L10.8 3.8 16.2 9.3 1 9.3 1 10.7 16.2 10.7 10.8 16.2 11.8 17.2 19 10z"></path>
                        </svg>
                    </p>
                </a>
            </section>

            <section class="tile-splash">
                <a href="#" style="text-decoration: none;">
                    <p>
                        CASE STUDIES / 案例研究 <span class="tile-detail">v2.1.23</span>
                        <svg focusable="false" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg" fill="currentColor" aria-hidden="true" width="20" height="20" viewBox="0 0 20 20">
                            <path d="M11.8 2.8L10.8 3.8 16.2 9.3 1 9.3 1 10.7 16.2 10.7 10.8 16.2 11.8 17.2 19 10z"></path>
                        </svg>
                    </p>
                </a>
            </section>
        </div>
    </div>

    <script>
        // ===== CONFIGURATION =====
        const CONFIG = {
            IDLE_DELAY: 2000,              // Milliseconds before GIF appears when idle
            HIDE_BUTTONS_ON_IDLE: true,    // Set to false to keep buttons visible when GIF shows
            BUTTON_FADE_DURATION: 600      // Button fade animation duration (matches CSS transition)
        };
        // =========================

        // State management
        let idleTimer = null;
        let isGifVisible = false;
        let lastMouseMove = Date.now();

        // DOM elements
        const mediaViewer = document.getElementById('mediaViewer');
        const buttonRows = document.getElementById('buttonRows');
        const mouseIndicator = document.querySelector('.mouse-indicator');

        // Initialize: Buttons visible, GIF hidden
        buttonRows.classList.remove('hidden');
        buttonRows.classList.add('visible');
        mediaViewer.classList.remove('active');

        // Mouse/touch tracking
        function handleMouseMove(e) {
            const x = e.clientX || (e.touches && e.touches[0].clientX);
            const y = e.clientY || (e.touches && e.touches[0].clientY);
            
            if (!x || !y) return;

            // Update mouse indicator position
            mouseIndicator.style.left = `${x}px`;
            mouseIndicator.style.top = `${y}px`;
            mouseIndicator.classList.add('active');

            lastMouseMove = Date.now();

            // If GIF is showing, hide it immediately on mouse move
            if (isGifVisible) {
                hideGif();
            }

            // Clear existing idle timer
            if (idleTimer) {
                clearTimeout(idleTimer);
            }

            // Set new idle timer to show GIF after configured delay
            idleTimer = setTimeout(() => {
                showGif();
            }, CONFIG.IDLE_DELAY);
        }

        // Show GIF overlay
        function showGif() {
            isGifVisible = true;
            mediaViewer.classList.add('active');

            // Hide buttons if configured to do so
            if (CONFIG.HIDE_BUTTONS_ON_IDLE) {
                buttonRows.classList.add('hidden');
                buttonRows.classList.remove('visible');
            }

            // Start video playback if it's a video element
            const video = mediaViewer.querySelector('video');
            if (video) {
                video.play().catch(err => console.log('Video autoplay prevented:', err));
            }
        }

        // Hide GIF overlay
        function hideGif() {
            isGifVisible = false;
            mediaViewer.classList.remove('active');

            // Show buttons again (always, regardless of config)
            buttonRows.classList.remove('hidden');
            buttonRows.classList.add('visible');

            // Pause video if it's playing
            const video = mediaViewer.querySelector('video');
            if (video) {
                video.pause();
            }
        }

        // Hide mouse indicator when idle
        function checkMouseIdle() {
            if (Date.now() - lastMouseMove > CONFIG.IDLE_DELAY + 1000) {
                mouseIndicator.classList.remove('active');
            }
        }

        // Touch events
        function handleTouchStart(e) {
            handleMouseMove(e);
        }

        // Event listeners
        document.addEventListener('mousemove', handleMouseMove);
        document.addEventListener('touchstart', handleTouchStart);
        document.addEventListener('touchmove', handleMouseMove);

        // Check for mouse idle periodically
        setInterval(checkMouseIdle, 500);

        // Start the idle timer on page load
        idleTimer = setTimeout(() => {
            showGif();
        }, CONFIG.IDLE_DELAY);

        // Helper function to switch media (for testing)
        window.switchToVideo = function(videoUrl) {
            mediaViewer.innerHTML = `
                <video loop muted playsinline>
                    <source src="${videoUrl}" type="video/mp4">
                    Your browser does not support the video tag.
                </video>
            `;
            
            if (isGifVisible) {
                const video = mediaViewer.querySelector('video');
                video.play().catch(err => console.log('Video playback error:', err));
            }
        };

        window.switchToGif = function(gifUrl) {
            mediaViewer.innerHTML = `<img src="${gifUrl}" alt="Background media">`;
        };

        // Cleanup on page unload
        window.addEventListener('beforeunload', () => {
            if (idleTimer) {
                clearTimeout(idleTimer);
            }
        });

        // Log instructions for developers
        console.log('%c🎬 Interactive Background Viewer', 'font-size: 16px; font-weight: bold; color: #1a3acc;');
        console.log('%cConfiguration:', 'font-weight: bold;');
        console.log('  IDLE_DELAY:', CONFIG.IDLE_DELAY + 'ms');
        console.log('  HIDE_BUTTONS_ON_IDLE:', CONFIG.HIDE_BUTTONS_ON_IDLE);
        console.log('  BUTTON_FADE_DURATION:', CONFIG.BUTTON_FADE_DURATION + 'ms');
        console.log('\n%cAvailable functions:', 'font-weight: bold;');
        console.log('- switchToVideo("url") - Load a video background');
        console.log('- switchToGif("url") - Load a GIF background');
        console.log('\n%cExample usage:', 'font-weight: bold;');
        console.log('switchToVideo("https://example.com/nature.mp4")');
    </script>
</body>
</html>
