    <style>
        /* Media viewer layer */
        
        .media-viewer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.6s ease;
        }
        
        .media-viewer.active {
            opacity: 1;
        }
        
        .media-viewer video,
        .media-viewer img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(0.7) contrast(1.1);
        }
        
        #collapse1 {
            position: relative;
            z-index: 2;
        }
        
        #collapse1 .row {
            transition: opacity 0.4s ease;
        }
        
        #collapse1.buttons-hidden .row {
            opacity: 0;
            pointer-events: none;
        }
        
        #collapse1.buttons-visible .row {
            opacity: 1;
            pointer-events: all;
        }
        
        .mouse-indicator {
            position: fixed;
            left: 18px;
            width: 14px;
            height: 14px;
            border: 2px solid #e0e9fe;
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            transition: transform 0.15s ease;
            opacity: 0;
            mix-blend-mode: difference;
        }
        
        .mouse-indicator.active {
            opacity: 1;
        }
        /* Video Controls */
        
        .video-controls {
            position: absolute;
            bottom: 20px;
            right: 20px;
            z-index: 3;
            display: flex;
            gap: 8px;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }
        
        .video-controls.visible {
            opacity: 1;
            pointer-events: all;
        }
        
        .video-control-btn {
            background: rgba(26, 58, 204, 0.9);
            border: 1px solid #e0e9fe;
            color: #ffffff;
            width: 32px;
            height: 32px;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            font-size: 14px;
        }
        
        .video-control-btn:hover {
            background: rgba(26, 58, 204, 1);
            transform: scale(1.05);
        }
        
        .video-control-btn i {
            pointer-events: none;
        }
    </style>

    <script>
        // ===== CONFIGURATION =====
        const CONFIG = {
            IDLE_DELAY: 2000,
            HIDE_BUTTONS_ON_IDLE: true,
            BUTTON_FADE_DURATION: 400
        };

        // State management
        let idleTimer = null;
        let isGifVisible = false;
        let lastMouseMove = Date.now();
        let isVideoPausedByUser = false;

        // DOM elements
        const mediaViewer = document.getElementById('mediaViewer');
        const buttonContainer = document.getElementById('collapse1');
        const mouseIndicator = document.querySelector('.mouse-indicator');
        const videoControls = document.getElementById('videoControls');
        const muteBtn = document.getElementById('muteBtn');
        const playPauseBtn = document.getElementById('playPauseBtn');
        const video = document.getElementById('gundam');

        // Mouse/touch tracking
        function handleMouseMove(e) {
            const x = e.clientX || (e.touches && e.touches[0].clientX);
            const y = e.clientY || (e.touches && e.touches[0].clientY);
            if (!x || !y) return;

            mouseIndicator.style.left = `${x}px`;
            mouseIndicator.style.top = `${y}px`;
            mouseIndicator.classList.add('active');
            lastMouseMove = Date.now();

            if (isGifVisible) hideGif();
            if (idleTimer) clearTimeout(idleTimer);

            // Don't start idle timer if video is paused by user
            if (!isVideoPausedByUser) {
                idleTimer = setTimeout(showGif, CONFIG.IDLE_DELAY);
            }
        }

        // Show video overlay
        function showGif() {
            if (isVideoPausedByUser) return; // Don't hide buttons if user paused

            isGifVisible = true;
            mediaViewer.classList.add('active');
            videoControls.classList.add('visible');

            if (CONFIG.HIDE_BUTTONS_ON_IDLE) {
                buttonContainer.classList.add('buttons-hidden');
                buttonContainer.classList.remove('buttons-visible');
            }

            if (video && !isVideoPausedByUser) {
                video.play().catch(err => console.log('Video autoplay prevented:', err));
            }
        }

        // Hide video overlay
        function hideGif() {
            isGifVisible = false;
            mediaViewer.classList.remove('active');
            videoControls.classList.remove('visible');

            buttonContainer.classList.remove('buttons-hidden');
            buttonContainer.classList.add('buttons-visible');

            if (video && !isVideoPausedByUser) {
                video.pause();
            }
        }

        // Mute/Unmute button
        muteBtn.addEventListener('click', function() {
            if (video.muted) {
                video.muted = false;
                muteBtn.innerHTML = '<i class="fa fa-volume-up"></i>';
                muteBtn.title = 'Mute video';
            } else {
                video.muted = true;
                muteBtn.innerHTML = '<i class="fa fa-volume-mute"></i>';
                muteBtn.title = 'Unmute video';
            }
        });

        // Play/Pause button
        playPauseBtn.addEventListener('click', function() {
            if (video.paused) {
                video.play();
                playPauseBtn.innerHTML = '<i class="fa fa-pause"></i>';
                playPauseBtn.title = 'Pause video';
                isVideoPausedByUser = false;

                // Restart idle timer
                if (idleTimer) clearTimeout(idleTimer);
                idleTimer = setTimeout(showGif, CONFIG.IDLE_DELAY);
            } else {
                video.pause();
                playPauseBtn.innerHTML = '<i class="fa fa-play"></i>';
                playPauseBtn.title = 'Play video';
                isVideoPausedByUser = true;

                // Keep buttons visible when paused
                hideGif();
                if (idleTimer) clearTimeout(idleTimer);
            }
        });

        // Hide mouse indicator when idle
        function checkMouseIdle() {
            if (Date.now() - lastMouseMove > CONFIG.IDLE_DELAY + 1000) {
                mouseIndicator.classList.remove('active');
            }
        }

        // Event listeners
        document.addEventListener('mousemove', handleMouseMove);
        document.addEventListener('touchstart', handleMouseMove);
        document.addEventListener('touchmove', handleMouseMove);
        setInterval(checkMouseIdle, 500);
        idleTimer = setTimeout(showGif, CONFIG.IDLE_DELAY);

        // Helper functions
        window.switchToVideo = function(videoUrl) {
            mediaViewer.innerHTML = `<video id="gundam" loop muted><source src="${videoUrl}" type="video/mp4"></video>`;
            if (isGifVisible) mediaViewer.querySelector('video').play();
        };

        window.switchToGif = function(gifUrl) {
            mediaViewer.innerHTML = `<img src="${gifUrl}" alt="Background media">`;
        };

        window.addEventListener('beforeunload', () => {
            if (idleTimer) clearTimeout(idleTimer);
        });

        console.log('%c🎬 Interactive Background Viewer', 'font-size: 16px; font-weight: bold; color: #1a3acc;');
        console.log('Config:', CONFIG);
    </script>
